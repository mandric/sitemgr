[api]
enabled = true
port = 54321
schemas = ["public", "storage"]

[db]
port = 54322
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]

[auth.email]
enable_signup = true
enable_confirmations = true

[auth.email.template.confirmation]
subject = "Confirm your email"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.invite]
subject = "You've been invited"
content_path = "./supabase/templates/invite.html"

[auth.email.template.magic_link]
subject = "Magic Link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.email_change]
subject = "Confirm email change"
content_path = "./supabase/templates/email_change.html"

[realtime]
enabled = false  # Realtime requires IPv6; not needed for v1 and breaks in containers without IPv6

[analytics]
enabled = false  # Disable analytics (causes issues with Colima Docker socket mounting)

[functions.whatsapp]
verify_jwt = false  # Twilio webhooks don't send JWTs
