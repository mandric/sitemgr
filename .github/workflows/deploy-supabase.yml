name: Deploy to Supabase

on:
  push:
    branches: [main, develop]
    paths:
      - 'supabase/**'
  workflow_dispatch:

env:
  WEBHOOK_URL: https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/whatsapp

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # --- Supabase: DB + Edge Function ---

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: supabase functions deploy whatsapp --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Edge Function secrets
        run: |
          supabase secrets set \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            TWILIO_ACCOUNT_SID="${{ secrets.TWILIO_ACCOUNT_SID }}" \
            TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}" \
            TWILIO_WHATSAPP_FROM="${{ secrets.TWILIO_WHATSAPP_FROM }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # --- Smoke test: Edge Function is live ---

      - name: Smoke test Edge Function
        run: |
          echo "Testing: $WEBHOOK_URL"
          RESPONSE=$(curl -sf "$WEBHOOK_URL")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'
          echo "Edge Function is live."

      # --- Twilio: Wire webhook automatically ---

      - name: Configure Twilio WhatsApp webhook
        run: |
          # Extract the raw phone number from whatsapp:+1234567890
          RAW_NUMBER=$(echo "${{ secrets.TWILIO_WHATSAPP_FROM }}" | sed 's/^whatsapp://')

          # Look up the phone number SID
          echo "Looking up Twilio phone number SID for $RAW_NUMBER..."
          LOOKUP=$(curl -sf -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}" \
            "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/IncomingPhoneNumbers.json?PhoneNumber=$RAW_NUMBER")

          PHONE_SID=$(echo "$LOOKUP" | python3 -c "import sys,json; nums=json.load(sys.stdin)['incoming_phone_numbers']; print(nums[0]['sid'] if nums else '')")

          if [ -n "$PHONE_SID" ]; then
            echo "Found phone SID: $PHONE_SID — updating webhook..."
            curl -sf -X POST \
              -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}" \
              "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/IncomingPhoneNumbers/$PHONE_SID.json" \
              -d "SmsUrl=$WEBHOOK_URL" \
              -d "SmsMethod=POST" \
              > /dev/null
            echo "Twilio webhook set to: $WEBHOOK_URL"
          else
            echo "::warning::Phone number SID not found — configuring via WhatsApp Sandbox instead"
            # Fallback: configure the WhatsApp sandbox
            curl -sf -X POST \
              -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}" \
              "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Sandbox.json" \
              -d "SmsUrl=$WEBHOOK_URL" \
              -d "SmsMethod=POST" \
              > /dev/null 2>&1 || echo "::warning::Sandbox API not available — set webhook manually in Twilio Console: $WEBHOOK_URL"
          fi

      # --- End-to-end verify ---

      - name: Verify Twilio can reach webhook
        run: |
          # Simulate a Twilio webhook POST (empty body)
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "From=whatsapp%3A%2B10000000000&Body=")
          echo "POST to webhook returned HTTP $STATUS"
          [ "$STATUS" = "200" ]
          echo "End-to-end verify passed."

      - name: Deployment summary
        run: |
          echo "=============================="
          echo "  DEPLOYMENT COMPLETE"
          echo "=============================="
          echo "Edge Function: $WEBHOOK_URL"
          echo "Twilio From:   ${{ secrets.TWILIO_WHATSAPP_FROM }}"
          echo "Status:        LIVE"
          echo "=============================="
          echo ""
          echo "Send a WhatsApp message to your Twilio number to test."
