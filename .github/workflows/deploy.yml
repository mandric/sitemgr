name: Deploy to Supabase

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy.yml'

  # Allow manual deployment
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.function_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: |
          echo "🚀 Linking to Supabase project..."
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run database migrations
        run: |
          echo "Running migrations..."
          supabase db push --dry-run
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Create storage bucket
        run: |
          echo "Creating media bucket..."
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_REF }}"
          SUPABASE_URL="https://${PROJECT_REF}.supabase.co"

          curl -X POST "${SUPABASE_URL}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "✓ Bucket already exists"

      - name: Deploy Edge Functions
        id: deploy
        run: |
          echo "Deploying Edge Function: whatsapp..."
          supabase functions deploy whatsapp --no-verify-jwt

          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_REF }}"
          FUNCTION_URL="https://${PROJECT_REF}.supabase.co/functions/v1/whatsapp"
          echo "function_url=$FUNCTION_URL" >> $GITHUB_OUTPUT
          echo "✅ Edge Function deployed to: $FUNCTION_URL"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Edge Function secrets
        run: |
          echo "Setting Edge Function secrets..."
          supabase secrets set \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            TWILIO_ACCOUNT_SID="${{ secrets.TWILIO_ACCOUNT_SID }}" \
            TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}" \
            TWILIO_WHATSAPP_FROM="${{ secrets.TWILIO_WHATSAPP_FROM }}" \
            ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}"

          echo "✅ Secrets configured"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deployment summary
        run: |
          PROJECT_REF="${{ secrets.SUPABASE_PROJECT_REF }}"

          echo ""
          echo "================================================"
          echo "  ✅ Deployment Complete"
          echo "================================================"
          echo ""
          echo "Edge Function URL:"
          echo "  https://${PROJECT_REF}.supabase.co/functions/v1/whatsapp"
          echo ""
          echo "Supabase Dashboard:"
          echo "  https://supabase.com/dashboard/project/${PROJECT_REF}"
          echo ""
          echo "🎉 Ready to use!"
          echo ""
