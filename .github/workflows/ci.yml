name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint JavaScript/TypeScript
        run: cd web && npm run lint

      - name: TypeScript type check
        run: cd web && npm run typecheck

      - name: Lint shell scripts
        run: find scripts -name '*.sh' -print0 | xargs -0 shellcheck -x

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build Next.js app
        run: cd web && npm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Run unit tests with coverage
        run: cd web && npx vitest run --project unit --coverage --coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=json --coverage.reporter=lcov --coverage.include='lib/**'

      - name: Report unit test coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: web
          name: Unit Tests
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: all

      - name: Generate HTML coverage report
        if: always()
        run: |
          sudo apt-get install -y -qq lcov > /dev/null
          cd web && genhtml coverage/lcov.info -o coverage/html --quiet

      - name: Upload unit coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: web/coverage/
          retention-days: 14

  integration-tests:
    name: Integration Tests (Supabase Local)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read Supabase version from scripts/lib.sh
        run: |
          source scripts/lib.sh
          echo "SUPABASE_PINNED_VERSION=$SUPABASE_PINNED_VERSION" >> "$GITHUB_ENV"

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_PINNED_VERSION }}

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Start Supabase local environment
        run: |
          supabase start
          echo "Supabase started successfully"

      - name: Configure environment
        run: |
          source scripts/lib.sh
          print_setup_env_vars >> "$GITHUB_ENV"
          # CI-specific overrides
          echo "SITEMGR_DEVICE_ID=ci-test" >> "$GITHUB_ENV"
          echo "SITEMGR_AUTO_ENRICH=true" >> "$GITHUB_ENV"
          echo "SITEMGR_OLLAMA_URL=http://localhost:11434" >> "$GITHUB_ENV"
          echo "SITEMGR_VISION_MODEL=moondream:1.8b" >> "$GITHUB_ENV"

      - name: Create webhook service account
        run: bash scripts/create-webhook-user.sh "${{ env.SITEMGR_API_URL }}" "${{ env.SUPABASE_SERVICE_ROLE_KEY }}"

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Restore Ollama model cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-moondream-1.8b-${{ runner.os }}

      - name: Start Ollama server
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 || { echo "::error::Ollama server failed to start within 30s"; exit 1; }

      - name: Pull moondream model
        run: ollama pull moondream:1.8b

      - name: Create storage bucket
        run: |
          curl -sf -X POST "${{ env.SITEMGR_API_URL }}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket may already exist"

      # Coverage note: Only direct-function-call tests (schema-contract,
      # media-storage, tenant-isolation, etc.) contribute coverage. The api-*
      # tests use fetch() against a separate Next.js process and can't be
      # instrumented by V8.
      - name: Run integration tests with coverage
        run: cd web && npx vitest run --project integration --coverage --coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=json --coverage.reporter=lcov --coverage.include='lib/**'

      - name: Report integration test coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: web
          name: Integration Tests (direct-call only)
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: all

      - name: Generate HTML coverage report
        if: always()
        run: |
          sudo apt-get install -y -qq lcov > /dev/null
          cd web && genhtml coverage/lcov.info -o coverage/html --quiet

      - name: Upload integration coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: web/coverage/
          retention-days: 14

      - name: Stop Supabase
        if: always()
        run: supabase stop

  e2e-tests:
    name: Web E2E Tests
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read Supabase version from scripts/lib.sh
        run: |
          source scripts/lib.sh
          echo "SUPABASE_PINNED_VERSION=$SUPABASE_PINNED_VERSION" >> "$GITHUB_ENV"

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_PINNED_VERSION }}

      - name: Install dependencies
        run: cd web && npm ci

      - name: Start Supabase
        run: supabase start

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Configure environment
        run: |
          source scripts/lib.sh
          print_setup_env_vars >> "$GITHUB_ENV"
          print_setup_env_vars > web/.env.local

      - name: Run E2E tests
        run: cd web && npm run test:e2e
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # TODO: Add preview-smoke-test job once a Preview environment is configured
  # in GitHub with VERCEL_TOKEN, VERCEL_PROJECT_ID, and VERCEL_TEAM_ID.
  # See wait_for_vercel_deployment and smoke_test in scripts/lib.sh.

  coverage-report:
    name: Combined Coverage Report
    needs: [unit-tests, integration-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage
          path: unit-coverage/

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: integration-coverage
          path: integration-coverage/

      - name: Merge and generate HTML report
        run: |
          sudo apt-get install -y -qq lcov > /dev/null
          lcov -a unit-coverage/lcov.info -a integration-coverage/lcov.info -o combined.info
          cd web && genhtml ../combined.info -o coverage-html --quiet
          cp ../combined.info coverage-html/lcov.info

      - name: Extract coverage summary
        id: coverage
        run: |
          node -e '
            const fs = require("fs");
            const unit = JSON.parse(fs.readFileSync("unit-coverage/coverage-summary.json"));
            const integ = JSON.parse(fs.readFileSync("integration-coverage/coverage-summary.json"));
            const u = unit.total, g = integ.total;
            const merge = (a, b) => ({
              total: Math.max(a.total, b.total),
              covered: a.covered + b.covered - Math.min(a.covered, b.covered),
              pct: 0
            });
            // For combined: use lcov summary for lines/functions (accurate merge),
            // use max of individual json-summaries for statements/branches (approximation)
            const fmt = (n) => n.toFixed(1) + "%";
            const stmts = { total: u.statements.total, covered: Math.max(u.statements.covered, g.statements.covered) };
            const branches = { total: u.branches.total, covered: Math.max(u.branches.covered, g.branches.covered) };
            console.log("statements=" + fmt(stmts.covered / stmts.total * 100));
            console.log("branches=" + fmt(branches.covered / branches.total * 100));
          ' >> "$GITHUB_OUTPUT"
          SUMMARY=$(lcov --summary combined.info 2>&1)
          echo "lines=$(echo "$SUMMARY" | grep 'lines' | grep -oP '[\d.]+%')" >> "$GITHUB_OUTPUT"
          echo "functions=$(echo "$SUMMARY" | grep 'functions' | grep -oP '[\d.]+%')" >> "$GITHUB_OUTPUT"

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pagesUrl = `https://${owner}.github.io/${repo}/`;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const marker = '<!-- combined-coverage-report -->';
            const body = [
              '## Combined Coverage (Unit + Integration)',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              '| Lines | **${{ steps.coverage.outputs.lines }}** |',
              '| Statements | **${{ steps.coverage.outputs.statements }}** |',
              '| Functions | **${{ steps.coverage.outputs.functions }}** |',
              '| Branches | **${{ steps.coverage.outputs.branches }}** |',
              '',
              `[View full report](${pagesUrl}) · [Download artifact](${runUrl}#artifacts)`,
              '',
              marker,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload combined coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage
          path: web/coverage-html/
          retention-days: 14

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/coverage-html/
          destination_dir: ./

  deploy:
    name: Deploy to Production
    needs: [lint, build, unit-tests, integration-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: Production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Read Supabase version from scripts/lib.sh
        run: |
          source scripts/lib.sh
          echo "SUPABASE_PINNED_VERSION=$SUPABASE_PINNED_VERSION" >> "$GITHUB_ENV"

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_PINNED_VERSION }}

      - name: Link to Supabase project
        run: |
          echo "Linking to Supabase project..."
          supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run database migrations
        run: |
          echo "Running migrations..."
          supabase db push --dry-run
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Create storage bucket
        run: |
          echo "Creating media bucket..."
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"
          SUPABASE_URL="https://${PROJECT_REF}.supabase.co"

          curl -X POST "${SUPABASE_URL}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket already exists"

      - name: Wait for Vercel deployment
        run: |
          source scripts/lib.sh
          wait_for_vercel_deployment --sha "$GITHUB_SHA" --target production
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
          echo "DEPLOY_ID=$DEPLOY_ID" >> "$GITHUB_ENV"

      - name: Smoke test (health check + POST)
        run: |
          source scripts/lib.sh
          smoke_test "${{ vars.VERCEL_APP_URL }}"

      - name: Check Vercel runtime logs
        if: always() && env.DEPLOY_ID != ''
        run: |
          source scripts/lib.sh
          vercel_log_check "${{ env.DEPLOY_ID }}"

      - name: Deployment summary
        run: |
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"

          echo ""
          echo "================================================"
          echo "  Deployment Complete"
          echo "================================================"
          echo ""
          echo "Next.js App + WhatsApp webhook: deployed via Vercel"
          echo "  WhatsApp webhook: ${{ vars.VERCEL_APP_URL }}/api/whatsapp"
          echo ""
          echo "Supabase (DB + Storage only):"
          echo "  https://supabase.com/dashboard/project/${PROJECT_REF}"
          echo ""
          echo "NOTE: Update Twilio webhook URL to: ${{ vars.VERCEL_APP_URL }}/api/whatsapp"
          echo ""
