name: CI — Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check prototype/

  integration-tests:
    name: Integration Tests (Supabase Local)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r prototype/requirements.txt

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # --- Start FULL Supabase local environment (not just db) ---

      - name: Start Supabase local environment
        run: |
          supabase start
          echo "Supabase started successfully"

      - name: Extract Supabase connection details
        run: |
          # Keys are UPPERCASE in status JSON
          echo "SUPABASE_URL=$(supabase status -o json | jq -r .API_URL)" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o json | jq -r .SERVICE_ROLE_KEY)" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(supabase status -o json | jq -r .ANON_KEY)" >> $GITHUB_ENV

      - name: Configure environment for smgr
        run: |
          echo "SMGR_S3_ENDPOINT=${{ env.SUPABASE_URL }}/storage/v1" >> $GITHUB_ENV
          echo "SMGR_S3_BUCKET=media" >> $GITHUB_ENV
          echo "SMGR_S3_REGION=local" >> $GITHUB_ENV
          echo "SMGR_DEVICE_ID=ci-test" >> $GITHUB_ENV
          echo "SMGR_AUTO_ENRICH=false" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=test-key" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=test-secret" >> $GITHUB_ENV

      - name: Create storage bucket
        run: |
          curl -sf -X POST "${{ env.SUPABASE_URL }}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket may already exist"

      # --- Database smoke tests ---

      - name: FTS smoke test
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "INSERT INTO events (id, \"timestamp\", device_id, type, content_type, content_hash) VALUES ('test-1', now(), 'ci', 'create', 'photo', 'abc123')"
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "INSERT INTO enrichments (event_id, description, objects, context, tags) VALUES ('test-1', 'A dog on a beach', ARRAY['dog','beach'], 'Vacation photo', ARRAY['travel','pets'])"
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "SELECT * FROM search_events('dog beach')" | grep -q test-1
          echo "✓ FTS smoke test passed"

      # --- Integration test suite ---

      - name: Run integration tests
        run: |
          chmod +x tests/integration_test.sh
          ./tests/integration_test.sh
        env:
          EXIT_ON_FAIL: "true"

      # --- Edge Function test ---

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Edge Function health check
        run: |
          export SUPABASE_URL=${{ env.SUPABASE_URL }}
          export SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          export ANTHROPIC_API_KEY=test-key
          export TWILIO_ACCOUNT_SID=test-sid
          export TWILIO_AUTH_TOKEN=test-token
          export TWILIO_WHATSAPP_FROM=whatsapp:+10000000000

          deno run --allow-env --allow-net supabase/functions/whatsapp/index.ts &
          DENO_PID=$!
          sleep 5

          response=$(curl -sf http://localhost:8000)
          echo "$response"
          echo "$response" | grep -q '"status":"ok"'
          echo "✓ Edge Function health check passed"

          kill $DENO_PID

      # --- Cleanup ---

      - name: Stop Supabase
        if: always()
        run: supabase stop

      - name: Test summary
        if: always()
        run: |
          echo ""
          echo "================================================"
          echo "  CI Tests Complete"
          echo "================================================"
          echo "✓ Linting passed"
          echo "✓ Database migrations applied"
          echo "✓ FTS search working"
          echo "✓ Integration tests passed"
          echo "✓ Edge Function healthy"
          echo ""
