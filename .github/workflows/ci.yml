name: CI — Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check prototype/

  migrations:
    name: Test Postgres Migrations
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smgr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Run all migrations in order
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: smgr_test
        run: |
          # Create the storage schema (normally provided by Supabase platform)
          psql -c "CREATE SCHEMA IF NOT EXISTS storage;"
          psql -c "CREATE TABLE IF NOT EXISTS storage.buckets (id TEXT PRIMARY KEY, name TEXT, public BOOLEAN);"

          # Apply each migration in order
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying $f..."
            psql -f "$f"
            echo "  OK"
          done
          echo "All migrations applied successfully."

      - name: Verify schema
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: smgr_test
        run: |
          # Verify tables exist
          psql -c "\dt" | grep -q events
          psql -c "\dt" | grep -q enrichments
          psql -c "\dt" | grep -q watched_keys
          psql -c "\dt" | grep -q conversations
          echo "All tables verified."

          # Verify RPC functions exist
          psql -c "\df" | grep -q stats_by_content_type
          psql -c "\df" | grep -q stats_by_event_type
          psql -c "\df" | grep -q search_events
          echo "All functions verified."

          # Verify FTS works by inserting test data
          psql -c "INSERT INTO events (id, timestamp, device_id, type, content_type, content_hash) VALUES ('test-1', now(), 'ci', 'create', 'photo', 'abc123');"
          psql -c "INSERT INTO enrichments (event_id, description, objects, context, tags) VALUES ('test-1', 'A dog on a beach', ARRAY['dog','beach'], 'Vacation photo', ARRAY['travel','pets']);"
          psql -c "SELECT event_id, fts IS NOT NULL as has_fts FROM enrichments;" | grep -q test-1
          psql -c "SELECT * FROM search_events('dog beach');" | grep -q test-1
          echo "FTS smoke test passed."

  build:
    name: Build & Integration Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker compose build smgr

      - name: Start MinIO
        run: |
          docker compose up -d minio
          docker compose up minio-setup

      - name: Run smgr init
        run: docker compose run --rm smgr prototype/smgr.py init

      - name: Run smgr stats
        run: docker compose run --rm smgr prototype/smgr.py stats

      - name: Upload test image to MinIO
        run: |
          # Create a small test JPEG (1x1 red pixel)
          echo -n '' | base64 -d > /tmp/test.jpg
          docker compose run --rm --entrypoint="" \
            -v /tmp/test.jpg:/tmp/test.jpg \
            smgr sh -c "python3 -c \"
          import boto3
          s3 = boto3.client('s3',
              endpoint_url='http://minio:9000',
              aws_access_key_id='minioadmin',
              aws_secret_access_key='minioadmin',
              region_name='us-east-1')
          s3.upload_file('/tmp/test.jpg', 'smgr-test', 'photos/test.jpg',
              ExtraArgs={'ContentType': 'image/jpeg'})
          print('Uploaded test.jpg to smgr-test')
          \""

      - name: Run smgr watch --once (detect new S3 object)
        run: docker compose run --rm smgr prototype/smgr.py watch --once

      - name: Verify event was created
        run: |
          docker compose run --rm smgr -c "
          import subprocess, json, sys
          result = subprocess.run(
              ['python3', 'prototype/smgr.py', 'query', '--format', 'json'],
              capture_output=True, text=True)
          print(result.stdout)
          events = json.loads(result.stdout)
          assert len(events) > 0, 'Expected at least one event after watch'
          print(f'OK: {len(events)} event(s) found')
          "

      - name: Run smoke tests
        run: |
          docker compose run --rm smgr prototype/smgr.py stats
          echo "All smoke tests passed"

      - name: Cleanup
        if: always()
        run: docker compose down -v
