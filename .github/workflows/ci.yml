name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint JavaScript/TypeScript
        run: cd web && npm run lint

      - name: TypeScript type check
        run: cd web && npm run typecheck

      - name: Lint shell scripts
        run: find scripts -name '*.sh' -print0 | xargs -0 shellcheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build Next.js app
        run: cd web && npm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Run unit tests
        run: cd web && npm test

  integration-tests:
    name: Integration Tests (Supabase Local)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local environment
        run: |
          supabase start
          echo "Supabase started successfully"

      - name: Extract Supabase connection details
        run: |
          set -euo pipefail
          STATUS_JSON=$(supabase status -o json)
          echo "SMGR_API_URL=$(echo "$STATUS_JSON" | jq -r .API_URL)" >> $GITHUB_ENV
          echo "SMGR_API_KEY=$(echo "$STATUS_JSON" | jq -r .ANON_KEY)" >> $GITHUB_ENV
          echo "SUPABASE_SECRET_KEY=$(echo "$STATUS_JSON" | jq -r .SERVICE_ROLE_KEY)" >> $GITHUB_ENV
          echo "STORAGE_S3_URL=$(echo "$STATUS_JSON" | jq -r .STORAGE_S3_URL)" >> $GITHUB_ENV

          AWS_ACCESS_KEY=$(supabase status | grep "Access Key" | awk -F '│' '{print $3}' | tr -d ' ')
          AWS_SECRET_KEY=$(supabase status | grep "Secret Key" | awk -F '│' '{print $3}' | tr -d ' ')
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_KEY" >> $GITHUB_ENV

      - name: Verify integration test env vars
        run: |
          missing=0
          for var in SMGR_API_URL SMGR_API_KEY SUPABASE_SECRET_KEY; do
            if [ -z "${!var}" ] || [ "${!var}" = "null" ]; then
              echo "ERROR: $var is not set (value: '${!var}')"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::Required env vars are missing. Run supabase start and check supabase status -o json."
            exit 1
          fi
          echo "All required env vars verified"

      - name: Configure environment for smgr
        run: |
          echo "SMGR_S3_ENDPOINT=${{ env.STORAGE_S3_URL }}" >> $GITHUB_ENV
          echo "SMGR_S3_BUCKET=media" >> $GITHUB_ENV
          echo "SMGR_S3_REGION=local" >> $GITHUB_ENV
          echo "SMGR_DEVICE_ID=ci-test" >> $GITHUB_ENV
          echo "SMGR_AUTO_ENRICH=true" >> $GITHUB_ENV
          echo "SMGR_OLLAMA_URL=http://localhost:11434" >> $GITHUB_ENV
          echo "SMGR_VISION_MODEL=moondream:1.8b" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_URL_S3=${{ env.STORAGE_S3_URL }}" >> $GITHUB_ENV

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Restore Ollama model cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-moondream-1.8b-${{ runner.os }}

      - name: Start Ollama server
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 || { echo "::error::Ollama server failed to start within 30s"; exit 1; }

      - name: Pull moondream model
        run: ollama pull moondream:1.8b

      - name: Create storage bucket
        run: |
          curl -sf -X POST "${{ env.SMGR_API_URL }}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket may already exist"

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Run integration tests
        run: cd web && npm run test:integration

      - name: Stop Supabase
        if: always()
        run: supabase stop

  e2e-tests:
    name: Web E2E Tests
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Install dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Extract Supabase connection details
        run: |
          echo "SUPABASE_URL=$(supabase status -o json | jq -r .API_URL)" >> $GITHUB_ENV
          echo "SUPABASE_PUBLISHABLE_KEY=$(supabase status -o json | jq -r .ANON_KEY)" >> $GITHUB_ENV

      - name: Set up environment for E2E tests
        run: |
          cd web
          printf '%s\n' \
            "NEXT_PUBLIC_SUPABASE_URL=${{ env.SUPABASE_URL }}" \
            "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ env.SUPABASE_PUBLISHABLE_KEY }}" \
            > .env.local

      - name: Run E2E tests
        run: cd web && npm run test:e2e
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # TODO: Add preview-smoke-test job once a Preview environment is configured
  # in GitHub with VERCEL_TOKEN, VERCEL_PROJECT_ID, and VERCEL_TEAM_ID.
  # See wait_for_vercel_deployment and smoke_test in scripts/lib.sh.

  deploy:
    name: Deploy to Production
    needs: [lint, build, unit-tests, integration-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: Production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: |
          echo "Linking to Supabase project..."
          supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run database migrations
        run: |
          echo "Running migrations..."
          supabase db push --dry-run
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Create storage bucket
        run: |
          echo "Creating media bucket..."
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"
          SUPABASE_URL="https://${PROJECT_REF}.supabase.co"

          curl -X POST "${SUPABASE_URL}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket already exists"

      - name: Wait for Vercel deployment
        run: |
          source scripts/lib.sh
          wait_for_vercel_deployment --sha "$GITHUB_SHA" --target production
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
          echo "DEPLOY_ID=$DEPLOY_ID" >> "$GITHUB_ENV"

      - name: Smoke test (health check + POST)
        run: |
          source scripts/lib.sh
          smoke_test "${{ vars.VERCEL_APP_URL }}"

      - name: Check Vercel runtime logs
        if: always() && env.DEPLOY_ID != ''
        run: |
          source scripts/lib.sh
          vercel_log_check "${{ env.DEPLOY_ID }}"

      - name: Deployment summary
        run: |
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"

          echo ""
          echo "================================================"
          echo "  Deployment Complete"
          echo "================================================"
          echo ""
          echo "Next.js App + WhatsApp webhook: deployed via Vercel"
          echo "  WhatsApp webhook: ${{ vars.VERCEL_APP_URL }}/api/whatsapp"
          echo ""
          echo "Supabase (DB + Storage only):"
          echo "  https://supabase.com/dashboard/project/${PROJECT_REF}"
          echo ""
          echo "NOTE: Update Twilio webhook URL to: ${{ vars.VERCEL_APP_URL }}/api/whatsapp"
          echo ""
