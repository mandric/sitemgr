name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint
        run: cd web && npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd web && npm ci

      - name: Run unit tests
        run: cd web && npm test

  integration-tests:
    name: Integration Tests (Supabase Local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local environment
        run: |
          supabase start
          echo "Supabase started successfully"

      - name: Extract Supabase connection details
        run: |
          echo "SUPABASE_URL=$(supabase status -o json | jq -r .API_URL)" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o json | jq -r .SERVICE_ROLE_KEY)" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(supabase status -o json | jq -r .ANON_KEY)" >> $GITHUB_ENV
          echo "STORAGE_S3_URL=$(supabase status -o json | jq -r .STORAGE_S3_URL)" >> $GITHUB_ENV

          AWS_ACCESS_KEY=$(supabase status | grep "Access Key" | awk -F '│' '{print $3}' | tr -d ' ')
          AWS_SECRET_KEY=$(supabase status | grep "Secret Key" | awk -F '│' '{print $3}' | tr -d ' ')
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_KEY" >> $GITHUB_ENV

      - name: Configure environment for smgr
        run: |
          echo "SMGR_S3_ENDPOINT=${{ env.STORAGE_S3_URL }}" >> $GITHUB_ENV
          echo "SMGR_S3_BUCKET=media" >> $GITHUB_ENV
          echo "SMGR_S3_REGION=local" >> $GITHUB_ENV
          echo "SMGR_DEVICE_ID=ci-test" >> $GITHUB_ENV
          echo "SMGR_AUTO_ENRICH=false" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_URL_S3=${{ env.STORAGE_S3_URL }}" >> $GITHUB_ENV

      - name: Create storage bucket
        run: |
          curl -sf -X POST "${{ env.SUPABASE_URL }}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket may already exist"

      - name: Install web dependencies
        run: cd web && npm ci

      - name: FTS smoke test
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "INSERT INTO events (id, \"timestamp\", device_id, type, content_type, content_hash) VALUES ('test-1', now(), 'ci', 'create', 'photo', 'abc123')"
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "INSERT INTO enrichments (event_id, description, objects, context, tags) VALUES ('test-1', 'A dog on a beach', ARRAY['dog','beach'], 'Vacation photo', ARRAY['travel','pets'])"
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "SELECT * FROM search_events('dog beach')" | grep -q test-1
          echo "FTS smoke test passed"

      - name: Stop Supabase
        if: always()
        run: supabase stop

  e2e-tests:
    name: Web E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Install dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Set up environment
        run: |
          cd web
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM=${{ vars.TWILIO_WHATSAPP_FROM }}
          EOF

      - name: Run E2E tests
        run: cd web && npm run test:e2e
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Stop Supabase
        if: always()
        run: supabase stop

  preview-smoke-test:
    name: Preview Deployment Smoke Test
    needs: [lint, unit-tests]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel preview deployment
        id: wait-preview
        run: |
          echo "Waiting for Vercel preview deployment for SHA ${{ github.event.pull_request.head.sha }}..."

          MAX_ATTEMPTS=60
          DELAY=10
          API_URL="https://api.vercel.com/v6/deployments"
          SHA="${{ github.event.pull_request.head.sha }}"

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESP=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "$API_URL?projectId=$VERCEL_PROJECT_ID&sha=$SHA&limit=1&teamId=$VERCEL_TEAM_ID")
            STATE=$(echo "$RESP" | jq -r '.deployments[0].state // "NOT_FOUND"')
            URL=$(echo "$RESP" | jq -r '.deployments[0].url // empty')
            DEPLOY_ID=$(echo "$RESP" | jq -r '.deployments[0].uid // empty')

            echo "Attempt $i/$MAX_ATTEMPTS: state=$STATE"

            if [ "$STATE" = "READY" ]; then
              echo "Preview deployment is READY: https://$URL"
              echo "PREVIEW_URL=https://$URL" >> "$GITHUB_ENV"
              echo "DEPLOY_ID=$DEPLOY_ID" >> "$GITHUB_ENV"
              exit 0
            elif [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "ERROR: Preview deployment failed with state: $STATE"
              echo "$RESP" | jq .
              exit 1
            fi

            sleep $DELAY
          done

          echo "ERROR: Preview deployment did not become ready after $((MAX_ATTEMPTS * DELAY))s"
          exit 1

      - name: Smoke test — health check (GET /api/whatsapp)
        run: |
          WEBHOOK_URL="${{ env.PREVIEW_URL }}/api/whatsapp"
          echo "Testing health check at: $WEBHOOK_URL"

          HTTP_CODE=$(curl -sS -o /tmp/health.json -w '%{http_code}' "$WEBHOOK_URL")
          echo "HTTP status: $HTTP_CODE"
          echo "Response:"
          jq . /tmp/health.json

          # Check overall status
          STATUS=$(jq -r '.status // empty' /tmp/health.json)
          if [ "$STATUS" != "ok" ]; then
            echo ""
            echo "========================================="
            echo "  HEALTH CHECK FAILED (status: $STATUS)"
            echo "========================================="

            # Show individual check results
            echo ""
            echo "Check details:"
            jq -r '.checks | to_entries[] | "  \(.key): \(.value)"' /tmp/health.json

            echo ""
            echo "The preview deployment has configuration issues."
            echo "Check Vercel environment variables for this project."
            exit 1
          fi

          echo "Health check passed — all checks ok"

      - name: Smoke test — POST webhook
        run: |
          WEBHOOK_URL="${{ env.PREVIEW_URL }}/api/whatsapp"
          echo "Testing POST webhook at: $WEBHOOK_URL"

          HTTP_CODE=$(curl -sS -o /tmp/post-response.txt -w '%{http_code}' \
            -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "From=whatsapp%3A%2B15005550006&Body=ping" \
            "$WEBHOOK_URL")
          echo "POST HTTP status: $HTTP_CODE"
          cat /tmp/post-response.txt

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: POST expected HTTP 200, got $HTTP_CODE"
            exit 1
          fi

          echo ""
          echo "POST smoke test passed"

      - name: Query Vercel runtime logs for errors
        if: always() && env.DEPLOY_ID != ''
        run: |
          echo "Querying Vercel runtime logs for deployment ${{ env.DEPLOY_ID }}..."
          echo ""

          # Fetch runtime logs from the last 5 minutes
          SINCE=$(date -d '5 minutes ago' +%s%3N 2>/dev/null || date -v-5M +%s000)

          LOGS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/deployments/${{ env.DEPLOY_ID }}/events?direction=backward&limit=100&teamId=$VERCEL_TEAM_ID&since=$SINCE" \
            2>/dev/null || echo "[]")

          # Check if we got valid JSON
          if ! echo "$LOGS" | jq empty 2>/dev/null; then
            echo "Warning: Could not parse Vercel logs response"
            echo "$LOGS"
            exit 0
          fi

          LOG_COUNT=$(echo "$LOGS" | jq 'length')
          echo "Retrieved $LOG_COUNT log entries"

          # Known error patterns to search for
          ERROR_PATTERNS="Invalid API key|PGRST|AuthApiError|Missing env vars|invalid_api_key|JWT expired|permission denied|relation.*does not exist"

          ERRORS=$(echo "$LOGS" | jq -r '.[].text // empty' 2>/dev/null | grep -iE "$ERROR_PATTERNS" || true)

          if [ -n "$ERRORS" ]; then
            echo ""
            echo "========================================="
            echo "  WARNING: Error patterns found in logs"
            echo "========================================="
            echo ""
            echo "$ERRORS"
            echo ""
            echo "These errors may indicate configuration issues."
            echo "Review the patterns above and check Vercel env vars."
            # Fail the step so it's visible in the PR checks
            exit 1
          else
            echo "No known error patterns found in runtime logs"
          fi

  deploy:
    name: Deploy to Production
    needs: [lint, unit-tests, integration-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: Production

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: |
          echo "Linking to Supabase project..."
          supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run database migrations
        run: |
          echo "Running migrations..."
          supabase db push --dry-run
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Create storage bucket
        run: |
          echo "Creating media bucket..."
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"
          SUPABASE_URL="https://${PROJECT_REF}.supabase.co"

          curl -X POST "${SUPABASE_URL}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket already exists"

      - name: Wait for Vercel deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
        run: |
          echo "Waiting for Vercel to deploy commit $GITHUB_SHA..."

          MAX_ATTEMPTS=60
          DELAY=10
          API_URL="https://api.vercel.com/v6/deployments"

          for i in $(seq 1 $MAX_ATTEMPTS); do
            RESP=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "$API_URL?projectId=$VERCEL_PROJECT_ID&target=production&sha=$GITHUB_SHA&limit=1&teamId=$VERCEL_TEAM_ID")
            STATE=$(echo "$RESP" | jq -r '.deployments[0].state // "NOT_FOUND"')
            URL=$(echo "$RESP" | jq -r '.deployments[0].url // empty')

            echo "Attempt $i/$MAX_ATTEMPTS: state=$STATE"

            if [ "$STATE" = "READY" ]; then
              echo "Vercel deployment is READY: https://$URL"
              echo "DEPLOY_URL=https://$URL" >> "$GITHUB_ENV"
              exit 0
            elif [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "ERROR: Vercel deployment failed with state: $STATE"
              echo "$RESP" | jq .
              exit 1
            fi

            sleep $DELAY
          done

          echo "ERROR: Vercel deployment did not become ready after $((MAX_ATTEMPTS * DELAY))s"
          exit 1

      - name: Smoke test WhatsApp webhook
        run: |
          WEBHOOK_URL="${{ vars.VERCEL_APP_URL }}/api/whatsapp"
          echo "Testing webhook at: $WEBHOOK_URL"

          HTTP_CODE=$(curl -sS -o /tmp/response.json -w '%{http_code}' "$WEBHOOK_URL")
          echo "HTTP status: $HTTP_CODE"
          jq . /tmp/response.json

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Expected HTTP 200, got $HTTP_CODE"
            exit 1
          fi

          STATUS=$(jq -r '.status // empty' /tmp/response.json)
          if [ "$STATUS" = "ok" ]; then
            echo "Health check passed — all checks ok"
          elif [ "$STATUS" = "degraded" ]; then
            echo "ERROR: Health check returned degraded status"
            echo "Check details:"
            jq -r '.checks | to_entries[] | "  \(.key): \(.value)"' /tmp/response.json
            exit 1
          else
            echo "ERROR: Unexpected response status: $STATUS"
            exit 1
          fi

          # POST smoke test — send a minimal Twilio-style form body
          # and verify the endpoint accepts it (returns 200 with TwiML)
          echo ""
          echo "Testing POST webhook..."
          HTTP_CODE=$(curl -sS -o /tmp/post-response.txt -w '%{http_code}' \
            -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "From=whatsapp%3A%2B15005550006&Body=ping" \
            "$WEBHOOK_URL")
          echo "POST HTTP status: $HTTP_CODE"
          cat /tmp/post-response.txt

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: POST expected HTTP 200, got $HTTP_CODE"
            exit 1
          fi

          echo "WhatsApp webhook POST smoke test passed!"

      - name: Query Vercel runtime logs for errors
        if: always() && env.DEPLOY_URL != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
        run: |
          # Extract deployment ID from the DEPLOY_URL
          DEPLOY_ID=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&sha=$GITHUB_SHA&limit=1&teamId=$VERCEL_TEAM_ID" \
            | jq -r '.deployments[0].uid // empty')

          if [ -z "$DEPLOY_ID" ]; then
            echo "Warning: Could not determine deployment ID, skipping log check"
            exit 0
          fi

          echo "Querying Vercel runtime logs for deployment $DEPLOY_ID..."

          SINCE=$(date -d '5 minutes ago' +%s%3N 2>/dev/null || date -v-5M +%s000)

          LOGS=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/deployments/$DEPLOY_ID/events?direction=backward&limit=100&teamId=$VERCEL_TEAM_ID&since=$SINCE" \
            2>/dev/null || echo "[]")

          if ! echo "$LOGS" | jq empty 2>/dev/null; then
            echo "Warning: Could not parse Vercel logs response"
            exit 0
          fi

          LOG_COUNT=$(echo "$LOGS" | jq 'length')
          echo "Retrieved $LOG_COUNT log entries"

          ERROR_PATTERNS="Invalid API key|PGRST|AuthApiError|Missing env vars|invalid_api_key|JWT expired|permission denied|relation.*does not exist"

          ERRORS=$(echo "$LOGS" | jq -r '.[].text // empty' 2>/dev/null | grep -iE "$ERROR_PATTERNS" || true)

          if [ -n "$ERRORS" ]; then
            echo ""
            echo "========================================="
            echo "  WARNING: Error patterns found in logs"
            echo "========================================="
            echo ""
            echo "$ERRORS"
            echo ""
            echo "Review the patterns above and check Vercel env vars."
            exit 1
          else
            echo "No known error patterns found in runtime logs"
          fi

      - name: Deployment summary
        run: |
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"

          echo ""
          echo "================================================"
          echo "  Deployment Complete"
          echo "================================================"
          echo ""
          echo "Next.js App + WhatsApp webhook: deployed via Vercel"
          echo "  WhatsApp webhook: ${{ vars.VERCEL_APP_URL }}/api/whatsapp"
          echo ""
          echo "Supabase (DB + Storage only):"
          echo "  https://supabase.com/dashboard/project/${PROJECT_REF}"
          echo ""
          echo "NOTE: Update Twilio webhook URL to: ${{ vars.VERCEL_APP_URL }}/api/whatsapp"
          echo ""
