name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint
        run: cd web && npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd web && npm ci

      - name: Run unit tests
        run: cd web && npm test

  integration-tests:
    name: Integration Tests (Supabase Local)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local environment
        run: |
          supabase start
          echo "Supabase started successfully"

      - name: Extract Supabase connection details
        run: |
          echo "SUPABASE_URL=$(supabase status -o json | jq -r .API_URL)" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o json | jq -r .SERVICE_ROLE_KEY)" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(supabase status -o json | jq -r .ANON_KEY)" >> $GITHUB_ENV
          echo "STORAGE_S3_URL=$(supabase status -o json | jq -r .STORAGE_S3_URL)" >> $GITHUB_ENV

          AWS_ACCESS_KEY=$(supabase status | grep "Access Key" | awk -F '│' '{print $3}' | tr -d ' ')
          AWS_SECRET_KEY=$(supabase status | grep "Secret Key" | awk -F '│' '{print $3}' | tr -d ' ')
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_KEY" >> $GITHUB_ENV

      - name: Configure environment for smgr
        run: |
          echo "SMGR_S3_ENDPOINT=${{ env.STORAGE_S3_URL }}" >> $GITHUB_ENV
          echo "SMGR_S3_BUCKET=media" >> $GITHUB_ENV
          echo "SMGR_S3_REGION=local" >> $GITHUB_ENV
          echo "SMGR_DEVICE_ID=ci-test" >> $GITHUB_ENV
          echo "SMGR_AUTO_ENRICH=false" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_URL_S3=${{ env.STORAGE_S3_URL }}" >> $GITHUB_ENV

      - name: Create storage bucket
        run: |
          curl -sf -X POST "${{ env.SUPABASE_URL }}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket may already exist"

      - name: Install web dependencies
        run: cd web && npm ci

      - name: FTS smoke test
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "INSERT INTO events (id, \"timestamp\", device_id, type, content_type, content_hash) VALUES ('test-1', now(), 'ci', 'create', 'photo', 'abc123')"
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "INSERT INTO enrichments (event_id, description, objects, context, tags) VALUES ('test-1', 'A dog on a beach', ARRAY['dog','beach'], 'Vacation photo', ARRAY['travel','pets'])"
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "SELECT * FROM search_events('dog beach')" | grep -q test-1
          echo "FTS smoke test passed"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Edge Function health check
        run: |
          export SUPABASE_URL=${{ env.SUPABASE_URL }}
          export SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          export ANTHROPIC_API_KEY=test-key
          export TWILIO_ACCOUNT_SID=test-sid
          export TWILIO_AUTH_TOKEN=test-token
          export TWILIO_WHATSAPP_FROM=whatsapp:+10000000000

          deno run --allow-env --allow-net supabase/functions/whatsapp/index.ts &
          DENO_PID=$!
          sleep 5

          response=$(curl -sf http://localhost:8000)
          echo "$response"
          echo "$response" | grep -q '"status":"ok"'
          echo "Edge Function health check passed"

          kill $DENO_PID

      - name: Edge Function bucket configuration tests
        run: |
          export SUPABASE_URL=${{ env.SUPABASE_URL }}
          export SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          export ENCRYPTION_KEY=test-encryption-key-for-ci-32!!
          export ANTHROPIC_API_KEY=test-key
          export TWILIO_ACCOUNT_SID=test-sid
          export TWILIO_AUTH_TOKEN=test-token
          export TWILIO_WHATSAPP_FROM=whatsapp:+10000000000

          deno test --allow-env --allow-net --no-check tests/edge_function_bucket_test.ts
          echo "Bucket configuration tests passed"

      - name: Edge Function end-to-end scan tests
        run: |
          export SUPABASE_URL=${{ env.SUPABASE_URL }}
          export SUPABASE_SERVICE_ROLE_KEY=${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          export STORAGE_S3_URL=${{ env.STORAGE_S3_URL }}
          export AWS_ACCESS_KEY_ID=${{ env.AWS_ACCESS_KEY_ID }}
          export AWS_SECRET_ACCESS_KEY=${{ env.AWS_SECRET_ACCESS_KEY }}
          export ENCRYPTION_KEY=test-encryption-key-for-ci-32!!
          export ANTHROPIC_API_KEY=test-key
          export TWILIO_ACCOUNT_SID=test-sid
          export TWILIO_AUTH_TOKEN=test-token
          export TWILIO_WHATSAPP_FROM=whatsapp:+10000000000

          deno test --allow-env --allow-net --allow-read --no-check tests/edge_function_scan_test.ts
          echo "End-to-end scan tests passed"

      - name: Stop Supabase
        if: always()
        run: supabase stop

  e2e-tests:
    name: Web E2E Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Install dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Set up environment
        run: |
          cd web
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM=${{ vars.TWILIO_WHATSAPP_FROM }}
          EOF

      - name: Run E2E tests
        run: cd web && npm run test:e2e
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Stop Supabase
        if: always()
        run: supabase stop

  deploy:
    name: Deploy to Production
    needs: [unit-tests, integration-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.function_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: |
          echo "Linking to Supabase project..."
          supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run database migrations
        run: |
          echo "Running migrations..."
          supabase db push --dry-run
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Create storage bucket
        run: |
          echo "Creating media bucket..."
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"
          SUPABASE_URL="https://${PROJECT_REF}.supabase.co"

          curl -X POST "${SUPABASE_URL}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket already exists"

      - name: Deploy Edge Functions
        id: deploy
        run: |
          echo "Deploying Edge Function: whatsapp..."
          supabase functions deploy whatsapp --no-verify-jwt

          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"
          FUNCTION_URL="https://${PROJECT_REF}.supabase.co/functions/v1/whatsapp"
          echo "function_url=$FUNCTION_URL" >> $GITHUB_OUTPUT
          echo "Edge Function deployed to: $FUNCTION_URL"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Edge Function secrets
        run: |
          echo "Setting Edge Function secrets..."
          supabase secrets set \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            TWILIO_ACCOUNT_SID="${{ secrets.TWILIO_ACCOUNT_SID }}" \
            TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}" \
            TWILIO_WHATSAPP_FROM="${{ vars.TWILIO_WHATSAPP_FROM }}" \
            ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}"

          echo "Secrets configured"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Smoke test Edge Function
        run: |
          WEBHOOK_URL="https://${{ vars.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/whatsapp"
          echo "Testing: $WEBHOOK_URL"
          RESPONSE=$(curl -sf "$WEBHOOK_URL")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'
          echo "Edge Function is live."

      - name: Configure Twilio WhatsApp webhook
        run: |
          WEBHOOK_URL="https://${{ vars.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/whatsapp"
          RAW_NUMBER=$(echo "${{ vars.TWILIO_WHATSAPP_FROM }}" | sed 's/^whatsapp://')

          echo "Looking up Twilio phone number SID for $RAW_NUMBER..."
          LOOKUP=$(curl -sf -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}" \
            "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/IncomingPhoneNumbers.json?PhoneNumber=$RAW_NUMBER")

          PHONE_SID=$(echo "$LOOKUP" | jq -r '.incoming_phone_numbers[0].sid // empty')

          if [ -n "$PHONE_SID" ]; then
            echo "Found phone SID: $PHONE_SID — updating webhook..."
            curl -sf -X POST \
              -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}" \
              "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/IncomingPhoneNumbers/$PHONE_SID.json" \
              -d "SmsUrl=$WEBHOOK_URL" \
              -d "SmsMethod=POST" \
              > /dev/null
            echo "Twilio webhook set to: $WEBHOOK_URL"
          else
            echo "::warning::Phone number SID not found — configuring via WhatsApp Sandbox instead"
            curl -sf -X POST \
              -u "${{ secrets.TWILIO_ACCOUNT_SID }}:${{ secrets.TWILIO_AUTH_TOKEN }}" \
              "https://api.twilio.com/2010-04-01/Accounts/${{ secrets.TWILIO_ACCOUNT_SID }}/Sandbox.json" \
              -d "SmsUrl=$WEBHOOK_URL" \
              -d "SmsMethod=POST" \
              > /dev/null 2>&1 || echo "::warning::Sandbox API not available — set webhook manually in Twilio Console: $WEBHOOK_URL"
          fi

      - name: Verify Twilio can reach webhook
        run: |
          WEBHOOK_URL="https://${{ vars.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1/whatsapp"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "From=whatsapp%3A%2B10000000000&Body=")
          echo "POST to webhook returned HTTP $STATUS"
          [ "$STATUS" = "200" ]
          echo "End-to-end verify passed."

      - name: Deploy Next.js app to Vercel
        id: vercel
        working-directory: web
        run: |
          echo "Deploying Next.js app to Vercel..."
          npm install -g vercel@latest

          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes > deployment-url.txt

          VERCEL_URL=$(cat deployment-url.txt | tail -n 1)
          echo "vercel_url=$VERCEL_URL" >> $GITHUB_OUTPUT
          echo "Next.js app deployed to: $VERCEL_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment summary
        run: |
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"

          echo ""
          echo "================================================"
          echo "  Deployment Complete"
          echo "================================================"
          echo ""
          echo "Next.js App:"
          echo "  ${{ steps.vercel.outputs.vercel_url }}"
          echo ""
          echo "Edge Function URL:"
          echo "  https://${PROJECT_REF}.supabase.co/functions/v1/whatsapp"
          echo ""
          echo "Supabase Dashboard:"
          echo "  https://supabase.com/dashboard/project/${PROJECT_REF}"
          echo ""
