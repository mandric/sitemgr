name: CI — Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check prototype/

  build:
    name: Build & Integration Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # --- Supabase migrations (db start = Postgres only) ---

      - name: Start local Postgres
        run: supabase db start

      - name: Apply migrations
        run: supabase db push --local

      - name: FTS smoke test
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "INSERT INTO events (id, \"timestamp\", device_id, type, content_type, content_hash) VALUES ('test-1', now(), 'ci', 'create', 'photo', 'abc123')"
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "INSERT INTO enrichments (event_id, description, objects, context, tags) VALUES ('test-1', 'A dog on a beach', ARRAY['dog','beach'], 'Vacation photo', ARRAY['travel','pets'])"
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -c "SELECT * FROM search_events('dog beach')" | grep -q test-1
          echo "FTS smoke test passed."

      - name: Stop Postgres
        if: always()
        run: supabase stop

      # --- Edge Function smoke test ---

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Edge Function health check
        run: |
          export SUPABASE_URL=http://localhost:54321
          export SUPABASE_SERVICE_ROLE_KEY=test-key
          export ANTHROPIC_API_KEY=test-key
          export TWILIO_ACCOUNT_SID=test-sid
          export TWILIO_AUTH_TOKEN=test-token
          export TWILIO_WHATSAPP_FROM=whatsapp:+10000000000
          deno run --allow-env --allow-net supabase/functions/whatsapp/index.ts &
          DENO_PID=$!
          sleep 5
          response=$(curl -sf http://localhost:8000)
          echo "$response"
          echo "$response" | grep -q '"status":"ok"'
          echo "Edge Function health check passed."
          kill $DENO_PID

      # --- S3 watcher integration test ---

      - name: Build Docker image
        run: docker compose build smgr

      - name: Start MinIO
        run: |
          docker compose up -d minio
          docker compose up minio-setup

      - name: Run smgr init
        run: docker compose run --rm smgr prototype/smgr.py init

      - name: Run smgr stats
        run: docker compose run --rm smgr prototype/smgr.py stats

      - name: Upload test image to MinIO
        run: |
          # Create a small test JPEG (1x1 red pixel)
          echo -n '' | base64 -d > /tmp/test.jpg
          docker compose run --rm --entrypoint="" \
            -v /tmp/test.jpg:/tmp/test.jpg \
            smgr sh -c "python3 -c \"
          import boto3
          s3 = boto3.client('s3',
              endpoint_url='http://minio:9000',
              aws_access_key_id='minioadmin',
              aws_secret_access_key='minioadmin',
              region_name='us-east-1')
          s3.upload_file('/tmp/test.jpg', 'smgr-test', 'photos/test.jpg',
              ExtraArgs={'ContentType': 'image/jpeg'})
          print('Uploaded test.jpg to smgr-test')
          \""

      - name: Run smgr watch --once (detect new S3 object)
        run: docker compose run --rm smgr prototype/smgr.py watch --once

      - name: Verify event was created
        run: |
          docker compose run --rm smgr -c "
          import subprocess, json, sys
          result = subprocess.run(
              ['python3', 'prototype/smgr.py', 'query', '--format', 'json'],
              capture_output=True, text=True)
          print(result.stdout)
          events = json.loads(result.stdout)
          assert len(events) > 0, 'Expected at least one event after watch'
          print(f'OK: {len(events)} event(s) found')
          "

      - name: Run smoke tests
        run: |
          docker compose run --rm smgr prototype/smgr.py stats
          echo "All smoke tests passed"

      - name: Cleanup
        if: always()
        run: docker compose down -v
