name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Lint JavaScript/TypeScript
        run: cd web && npm run lint

      - name: TypeScript type check
        run: cd web && npm run typecheck

      - name: Lint shell scripts
        run: find scripts -name '*.sh' -print0 | xargs -0 shellcheck -x

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build Next.js app
        run: cd web && npm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Run unit tests with coverage
        run: cd web && npx vitest run --project unit --coverage --coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=json --coverage.reporter=lcov --coverage.reporter=html --coverage.include='lib/**' --coverage.include='components/**' --coverage.include='bin/**'

      - name: Report unit test coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: web
          name: Unit Tests
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: all

      - name: Upload unit coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: web/coverage/
          retention-days: 14

  integration-tests:
    name: Integration Tests (Supabase Local)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read Supabase version from scripts/lib.sh
        run: |
          source scripts/lib.sh
          echo "SUPABASE_PINNED_VERSION=$SUPABASE_PINNED_VERSION" >> "$GITHUB_ENV"

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_PINNED_VERSION }}

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Start Supabase local environment
        run: |
          supabase start
          echo "Supabase started successfully"

      - name: Configure environment
        run: |
          source scripts/lib.sh
          print_setup_env_vars >> "$GITHUB_ENV"
          # CI-specific overrides
          echo "SITEMGR_DEVICE_ID=ci-test" >> "$GITHUB_ENV"
          echo "SITEMGR_AUTO_ENRICH=true" >> "$GITHUB_ENV"
          echo "SITEMGR_OLLAMA_URL=http://localhost:11434" >> "$GITHUB_ENV"
          echo "SITEMGR_VISION_MODEL=moondream:1.8b" >> "$GITHUB_ENV"

      - name: Create webhook service account
        run: bash scripts/create-webhook-user.sh "${{ env.SITEMGR_API_URL }}" "${{ env.SUPABASE_SERVICE_ROLE_KEY }}"

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Restore Ollama model cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-moondream-1.8b-${{ runner.os }}

      - name: Start Ollama server
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 || { echo "::error::Ollama server failed to start within 30s"; exit 1; }

      - name: Pull moondream model
        run: ollama pull moondream:1.8b

      - name: Create storage bucket
        run: |
          curl -sf -X POST "${{ env.SITEMGR_API_URL }}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket may already exist"

      # Coverage: vitest collects in-process coverage (direct-call tests).
      # The globalSetup spawns the Next.js dev server with NODE_V8_COVERAGE,
      # so route handler coverage is captured when the server exits.
      - name: Run integration tests with coverage
        run: cd web && npx vitest run --project integration --coverage --coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=json --coverage.reporter=lcov --coverage.include='lib/**'

      - name: Convert Next.js server coverage
        if: always()
        run: |
          source scripts/lib.sh
          convert_v8_coverage /tmp/v8-coverage-nextjs coverage-server web

      - name: Merge vitest + server coverage
        if: always()
        run: |
          sudo apt-get install -y -qq lcov > /dev/null
          cd web
          if [ -f coverage-server/lcov.info ]; then
            lcov -a coverage/lcov.info -a coverage-server/lcov.info -o coverage/lcov-merged.info
            mv coverage/lcov-merged.info coverage/lcov.info
            echo "Merged vitest + server coverage"
          else
            echo "No server coverage to merge — using vitest coverage only"
          fi

      - name: Report integration test coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: web
          name: Integration Tests
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          file-coverage-mode: all

      - name: Upload integration coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: web/coverage/
          retention-days: 14

      - name: Stop Supabase
        if: always()
        run: supabase stop

  e2e-cli-tests:
    name: E2E CLI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read Supabase version from scripts/lib.sh
        run: |
          source scripts/lib.sh
          echo "SUPABASE_PINNED_VERSION=$SUPABASE_PINNED_VERSION" >> "$GITHUB_ENV"

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_PINNED_VERSION }}

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Start Supabase local environment
        run: |
          supabase start
          echo "Supabase started successfully"

      - name: Configure environment
        run: |
          source scripts/lib.sh
          print_setup_env_vars >> "$GITHUB_ENV"
          echo "SITEMGR_DEVICE_ID=ci-test" >> "$GITHUB_ENV"
          echo "SITEMGR_AUTO_ENRICH=true" >> "$GITHUB_ENV"
          echo "SITEMGR_OLLAMA_URL=http://localhost:11434" >> "$GITHUB_ENV"
          echo "SITEMGR_VISION_MODEL=moondream:1.8b" >> "$GITHUB_ENV"

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Restore Ollama model cache
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-moondream-1.8b-${{ runner.os }}

      - name: Start Ollama server
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 || { echo "::error::Ollama server failed to start within 30s"; exit 1; }

      - name: Pull moondream model
        run: ollama pull moondream:1.8b

      - name: Create storage bucket
        run: |
          curl -sf -X POST "${{ env.SITEMGR_API_URL }}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket may already exist"

      - name: Run E2E CLI tests
        run: cd web && npm run test:e2e:cli

      - name: Convert Next.js server coverage
        if: always()
        run: |
          source scripts/lib.sh
          convert_v8_coverage /tmp/v8-coverage-nextjs coverage web

      - name: Generate E2E CLI coverage summary
        if: always()
        run: |
          if [ -s web/coverage/lcov.info ]; then
            node scripts/coverage-summary.mjs web/coverage/lcov.info web/coverage \
              --repo "${{ github.repository }}" \
              --sha "${{ github.event.pull_request.head.sha || github.sha }}" \
              --title "E2E CLI Tests Coverage" \
              --job-summary "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload e2e-cli coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cli-coverage
          path: web/coverage/
          retention-days: 14
          if-no-files-found: ignore

      - name: Stop Supabase
        if: always()
        run: supabase stop

  e2e-tests:
    name: Web E2E Tests
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read Supabase version from scripts/lib.sh
        run: |
          source scripts/lib.sh
          echo "SUPABASE_PINNED_VERSION=$SUPABASE_PINNED_VERSION" >> "$GITHUB_ENV"

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_PINNED_VERSION }}

      - name: Install dependencies
        run: cd web && npm ci

      - name: Start Supabase
        run: supabase start

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Configure environment
        run: |
          source scripts/lib.sh
          print_setup_env_vars >> "$GITHUB_ENV"
          print_setup_env_vars > web/.env.local

      - name: Run E2E tests
        run: cd web && npm run test:e2e
        env:
          CI: true
          NODE_V8_COVERAGE: /tmp/v8-coverage-e2e-web

      - name: Convert E2E web server coverage
        if: always()
        run: |
          source scripts/lib.sh
          convert_v8_coverage /tmp/v8-coverage-e2e-web coverage web

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Convert browser client coverage
        if: always()
        run: |
          source scripts/lib.sh
          convert_v8_coverage /tmp/v8-coverage-playwright-client coverage-client web

      - name: Generate E2E Web coverage summary
        if: always()
        run: |
          sudo apt-get install -y -qq lcov > /dev/null
          source scripts/lib.sh
          ARGS=""
          [ -s web/coverage/lcov.info ] && ARGS="$ARGS -a web/coverage/lcov.info"
          [ -s web/coverage-client/lcov.info ] && ARGS="$ARGS -a web/coverage-client/lcov.info"
          if [ -n "$ARGS" ]; then
            # shellcheck disable=SC2086
            merge_lcov web/coverage/lcov-e2e-web-combined.info $ARGS
            node scripts/coverage-summary.mjs web/coverage/lcov-e2e-web-combined.info web/coverage \
              --repo "${{ github.repository }}" \
              --sha "${{ github.event.pull_request.head.sha || github.sha }}" \
              --title "Web E2E Tests Coverage" \
              --job-summary "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload e2e-web server coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-web-coverage
          path: web/coverage/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload e2e-web client coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-web-client-coverage
          path: web/coverage-client/
          retention-days: 14
          if-no-files-found: ignore

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # TODO: Add preview-smoke-test job once a Preview environment is configured
  # in GitHub with VERCEL_TOKEN, VERCEL_PROJECT_ID, and VERCEL_TEAM_ID.
  # See wait_for_vercel_deployment and smoke_test in scripts/lib.sh.

  coverage-report:
    name: Combined Coverage Report
    needs: [unit-tests, integration-tests, e2e-cli-tests, e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: '*-coverage'

      - name: Merge coverage and generate summary
        run: |
          sudo apt-get install -y -qq lcov > /dev/null
          source scripts/lib.sh
          ARGS=""
          for f in unit-coverage integration-coverage e2e-cli-coverage e2e-web-coverage e2e-web-client-coverage; do
            echo "Checking $f/lcov.info: $([ -s "$f/lcov.info" ] && echo "$(wc -l < "$f/lcov.info") lines" || echo "missing/empty")"
            [ -s "$f/lcov.info" ] && ARGS="$ARGS -a $f/lcov.info"
          done
          if [ -n "$ARGS" ]; then
            # shellcheck disable=SC2086
            merge_lcov combined.info $ARGS
            node scripts/coverage-summary.mjs combined.info pages-output \
              --repo "${{ github.repository }}" \
              --sha "${{ github.event.pull_request.head.sha || github.sha }}" \
              --title "Combined Coverage Report" \
              --job-summary "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload combined coverage artifact
        if: hashFiles('combined.info') != ''
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage
          path: combined.info
          retention-days: 14

  deploy:
    name: Deploy to Production
    needs: [lint, build, unit-tests, integration-tests, e2e-cli-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: Production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Read Supabase version from scripts/lib.sh
        run: |
          source scripts/lib.sh
          echo "SUPABASE_PINNED_VERSION=$SUPABASE_PINNED_VERSION" >> "$GITHUB_ENV"

      - uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_PINNED_VERSION }}

      - name: Link to Supabase project
        run: |
          echo "Linking to Supabase project..."
          supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run database migrations
        run: |
          echo "Running migrations..."
          supabase db push --dry-run
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Create storage bucket
        run: |
          echo "Creating media bucket..."
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"
          SUPABASE_URL="https://${PROJECT_REF}.supabase.co"

          curl -X POST "${SUPABASE_URL}/storage/v1/bucket" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"id":"media","name":"media","public":false}' \
            || echo "Bucket already exists"

      - name: Wait for Vercel deployment
        run: |
          source scripts/lib.sh
          wait_for_vercel_deployment --sha "$GITHUB_SHA" --target production
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
          echo "DEPLOY_ID=$DEPLOY_ID" >> "$GITHUB_ENV"

      - name: Smoke test (health check + POST)
        run: |
          source scripts/lib.sh
          smoke_test "${{ vars.VERCEL_APP_URL }}"

      - name: Check Vercel runtime logs
        if: always() && env.DEPLOY_ID != ''
        run: |
          source scripts/lib.sh
          vercel_log_check "${{ env.DEPLOY_ID }}"

      - name: Deployment summary
        run: |
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"

          echo ""
          echo "================================================"
          echo "  Deployment Complete"
          echo "================================================"
          echo ""
          echo "Next.js App + WhatsApp webhook: deployed via Vercel"
          echo "  WhatsApp webhook: ${{ vars.VERCEL_APP_URL }}/api/whatsapp"
          echo ""
          echo "Supabase (DB + Storage only):"
          echo "  https://supabase.com/dashboard/project/${PROJECT_REF}"
          echo ""
          echo "NOTE: Update Twilio webhook URL to: ${{ vars.VERCEL_APP_URL }}/api/whatsapp"
          echo ""
