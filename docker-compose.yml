services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/smgr-test &&
      mc anonymous set download local/smgr-test &&
      echo 'Bucket smgr-test ready'
      "

  smgr:
    build: .
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    environment:
      SMGR_S3_BUCKET: smgr-test
      SMGR_S3_ENDPOINT: http://minio:9000
      SMGR_S3_REGION: us-east-1
      SMGR_DEVICE_ID: ci-test
      SMGR_AUTO_ENRICH: "false"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - smgr-data:/root/.sitemgr
    # Default: init + watch --once
    command: ["prototype/smgr.py", "init"]

  bot:
    build: .
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    environment:
      SMGR_S3_BUCKET: smgr-test
      SMGR_S3_ENDPOINT: http://minio:9000
      SMGR_S3_REGION: us-east-1
      SMGR_DEVICE_ID: ci-test
      SMGR_AUTO_ENRICH: "false"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-test-key}
    volumes:
      - smgr-data:/root/.sitemgr
    command: ["prototype/bot.py", "--stdio"]
    profiles:
      - bot  # only started when explicitly requested

volumes:
  smgr-data:
